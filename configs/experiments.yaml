# Master experiment config — defines all benchmark runs
#
# Priority: defaults → augmentation config → experiment overrides.
# Experiment-level values always win, enabling per-experiment ablation.
#
# Each experiment inherits from 'defaults' and can override any field.
# Adding a new model = adding 3-4 lines here. No code changes needed.
#
# Per-experiment augmentation override:
#   augmentation: configs/augmentation_none.yaml   # use a different aug file
#   mosaic: 0.0                                    # or override individual values

defaults:
  imgsz: 640
  epochs: 50
  patience: 10
  seed: 42
  optimizer: auto
  workers: 8
  device: 0                  # GPU 0 (auto-fallback to CPU if unavailable)
  batch: -1                  # auto-detect from VRAM
  data: configs/dataset.yaml
  deterministic: true
  save: true
  plots: true

experiments:
  yolo11s_baseline:
    description: "YOLOv11s baseline — standard 3-scale detection head"
    model: yolo11s.pt
    strategy: baseline

  yolo11s_p2:
    description: "YOLOv11s + P2 head — architectural stride-4 small-object scale"
    model: models/yolo11s-p2.yaml
    pretrained: yolo11s.pt
    strategy: architectural_p2

  yolo26s:
    description: "YOLO26s — NMS-free with STAL + ProgLoss small-object training"
    model: yolo26s.pt
    strategy: stal_progloss

  yolo26n:
    description: "YOLO26n — nano speed variant of YOLO26"
    model: yolo26n.pt
    strategy: stal_progloss_nano

  # ── Round 2: Augmentation ablation on yolo11s_p2 (Round 1 winner) ──
  # Each experiment trains from the same COCO pretrained weights with
  # different augmentation. Comparing mAP tells us what each augmentation adds.

  p2_no_aug:
    description: "P2 with zero augmentation (ablation baseline)"
    model: models/yolo11s-p2.yaml
    pretrained: yolo11s.pt
    augmentation: configs/augmentation_none.yaml
    strategy: ablation

  p2_mosaic_only:
    description: "P2 with only mosaic (most impactful single augmentation)"
    model: models/yolo11s-p2.yaml
    pretrained: yolo11s.pt
    augmentation: configs/augmentation_none.yaml
    mosaic: 0.5
    close_mosaic: 10
    strategy: ablation

  p2_geometric:
    description: "P2 with spatial augmentations (mosaic + scale + translate + fliplr)"
    model: models/yolo11s-p2.yaml
    pretrained: yolo11s.pt
    augmentation: configs/augmentation_none.yaml
    mosaic: 0.5
    scale: 0.5
    translate: 0.1
    fliplr: 0.5
    close_mosaic: 10
    strategy: ablation

  p2_color:
    description: "P2 with only color augmentation (HSV shifts)"
    model: models/yolo11s-p2.yaml
    pretrained: yolo11s.pt
    augmentation: configs/augmentation_none.yaml
    hsv_h: 0.015
    hsv_s: 0.5
    hsv_v: 0.3
    strategy: ablation

  p2_full_aug:
    description: "P2 with full augmentation suite (should match Round 1 yolo11s_p2)"
    model: models/yolo11s-p2.yaml
    pretrained: yolo11s.pt
    strategy: ablation
