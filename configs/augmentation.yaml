# Augmentation config — tuned for small-object aerial UAV detection
#
# Design rationale:
#   - Mosaic 0.5: half the time model sees full-size tiny objects (not shrunk by mosaic)
#   - No mixup: blending destroys tiny-object contrast
#   - No flipud: UAVs don't fly upside down, horizon stays horizontal
#   - No rotation/perspective: fixed-wing aircraft maintain orientation, horizon is level
#   - Conservative scale: aggressive downscale destroys sub-20px targets
#   - Moderate HSV: outdoor lighting varies but heavy shifts mask gray UAV on gray sky

# Mosaic & mixing
mosaic: 0.5
mixup: 0.0
copy_paste: 0.0

# Geometric
scale: 0.5
translate: 0.1
fliplr: 0.5
flipud: 0.0
degrees: 0.0
perspective: 0.0
shear: 0.0

# Color
hsv_h: 0.015
hsv_s: 0.5
hsv_v: 0.3

# Erasing (disabled — would erase the one tiny target)
erasing: 0.0

# Mosaic close-out (disable mosaic for final N epochs to stabilize)
close_mosaic: 10
